opencollection: 1.0.0

info:
  name: deko
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ""
      port: ""
      auth:
        username: ""
        password: ""
      bypassProxy: ""

request:
  variables:
    - name: BASE_URL
      value: http://localhost:8000
    - name: SERVICE_ID
      value: your-service-uuid
    - name: TOKEN_ID
      value: your-token-uuid
    - name: SIM_URL
      value: http://localhost:5000
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
